kind = "web"
previewPath = "/"
title = "Otis — Financial Life Map"
version = "1.0.0"
id = "artifacts/otis"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26154

[services.development]
run = "pnpm --filter @workspace/otis run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/otis", "run", "build" ]
publicDir = "artifacts/otis/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26154"
BASE_PATH = "/"
