kind = "web"
previewPath = "/coming-soon/"
title = "Otis — Coming Soon"
version = "1.0.0"
id = "artifacts/coming-soon"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/coming-soon/" ]
localPort = 19580

[services.development]
run = "pnpm --filter @workspace/coming-soon run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/coming-soon", "run", "build" ]
publicDir = "artifacts/coming-soon/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19580"
BASE_PATH = "/coming-soon/"
