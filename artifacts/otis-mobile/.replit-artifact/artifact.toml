kind = "mobile"
previewPath = "/mobile/"
title = "Otis Mobile"
version = "1.0.0"
id = "artifacts/otis-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 24577

[services.development]
run = "pnpm --filter @workspace/otis-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/otis-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/otis-mobile", "run", "serve" ]

[services.env]
PORT = "24577"
BASE_PATH = "/mobile/"
