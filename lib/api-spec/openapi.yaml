openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Otis Financial Life Map API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: bills
    description: Bill management
  - name: paySchedules
    description: Pay schedule management
  - name: accounts
    description: Account management
  - name: assets
    description: Assets and liabilities management
  - name: forecasts
    description: Cash flow forecasting
  - name: dashboard
    description: Dashboard summaries
  - name: anthropic
    description: Anthropic AI chat operations
  - name: userSettings
    description: User preferences and settings

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Dashboard ──────────────────────────────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary (net worth, cash flow, upcoming bills)
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  # ── Bills ───────────────────────────────────────────────────────────────────
  /bills:
    get:
      operationId: listBills
      tags: [bills]
      summary: List all bills
      responses:
        "200":
          description: List of bills
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bill"
    post:
      operationId: createBill
      tags: [bills]
      summary: Create a bill
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BillInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bill"

  /bills/upcoming:
    get:
      operationId: getUpcomingBills
      tags: [bills]
      summary: Get bills due in the next 30 days
      responses:
        "200":
          description: Upcoming bills
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UpcomingBill"

  /bills/{id}:
    get:
      operationId: getBill
      tags: [bills]
      summary: Get a bill by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bill
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bill"
        "404":
          description: Not found
    patch:
      operationId: updateBill
      tags: [bills]
      summary: Update a bill
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BillUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bill"
        "404":
          description: Not found
    delete:
      operationId: deleteBill
      tags: [bills]
      summary: Delete a bill
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  # ── Life Events ───────────────────────────────────────────────────────────
  /life-events:
    get:
      operationId: listLifeEvents
      tags: [lifeEvents]
      summary: List all life events
      responses:
        "200":
          description: List of life events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LifeEvent"
    post:
      operationId: createLifeEvent
      tags: [lifeEvents]
      summary: Create a life event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LifeEventInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LifeEvent"

  /life-events/{id}:
    patch:
      operationId: updateLifeEvent
      tags: [lifeEvents]
      summary: Update a life event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LifeEventUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LifeEvent"
        "404":
          description: Not found
    delete:
      operationId: deleteLifeEvent
      tags: [lifeEvents]
      summary: Delete a life event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  # ── Pay Schedules ─────────────────────────────────────────────────────────
  /pay-schedules:
    get:
      operationId: listPaySchedules
      tags: [paySchedules]
      summary: List all pay schedules
      responses:
        "200":
          description: List of pay schedules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PaySchedule"
    post:
      operationId: createPaySchedule
      tags: [paySchedules]
      summary: Create a pay schedule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PayScheduleInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaySchedule"

  /pay-schedules/{id}:
    get:
      operationId: getPaySchedule
      tags: [paySchedules]
      summary: Get a pay schedule by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Pay schedule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaySchedule"
        "404":
          description: Not found
    patch:
      operationId: updatePaySchedule
      tags: [paySchedules]
      summary: Update a pay schedule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PayScheduleUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaySchedule"
        "404":
          description: Not found
    delete:
      operationId: deletePaySchedule
      tags: [paySchedules]
      summary: Delete a pay schedule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Accounts ──────────────────────────────────────────────────────────────
  /accounts:
    get:
      operationId: listAccounts
      tags: [accounts]
      summary: List all accounts
      responses:
        "200":
          description: List of accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Account"
    post:
      operationId: createAccount
      tags: [accounts]
      summary: Create an account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"

  /accounts/summary:
    get:
      operationId: getAccountsSummary
      tags: [accounts]
      summary: Get net worth and breakdown by account type
      responses:
        "200":
          description: Accounts summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountsSummary"

  /accounts/{id}:
    get:
      operationId: getAccount
      tags: [accounts]
      summary: Get an account by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "404":
          description: Not found
    patch:
      operationId: updateAccount
      tags: [accounts]
      summary: Update an account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "404":
          description: Not found
    delete:
      operationId: deleteAccount
      tags: [accounts]
      summary: Delete an account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Assets & Liabilities ──────────────────────────────────────────────────
  /assets:
    get:
      operationId: listAssets
      tags: [assets]
      summary: List all assets and liabilities
      responses:
        "200":
          description: List of assets and liabilities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Asset"
    post:
      operationId: createAsset
      tags: [assets]
      summary: Create an asset or liability
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssetInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Asset"

  /assets/summary:
    get:
      operationId: getAssetsSummary
      tags: [assets]
      summary: Get net worth and breakdown by asset type
      responses:
        "200":
          description: Assets summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetsSummary"

  /assets/{id}:
    get:
      operationId: getAsset
      tags: [assets]
      summary: Get an asset or liability by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Asset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Asset"
        "404":
          description: Not found
    patch:
      operationId: updateAsset
      tags: [assets]
      summary: Update an asset or liability
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssetUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Asset"
        "404":
          description: Not found
    delete:
      operationId: deleteAsset
      tags: [assets]
      summary: Delete an asset or liability
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Loans ─────────────────────────────────────────────────────────────────
  /loans:
    get:
      operationId: listLoans
      tags: [loans]
      summary: List all loans
      responses:
        "200":
          description: List of loans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Loan"
    post:
      operationId: createLoan
      tags: [loans]
      summary: Create a loan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoanInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Loan"

  /loans/summary:
    get:
      operationId: getLoansSummary
      tags: [loans]
      summary: Get total debt, monthly payments, and payoff date range
      responses:
        "200":
          description: Loans summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoansSummary"

  /loans/{id}:
    get:
      operationId: getLoan
      tags: [loans]
      summary: Get a loan by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Loan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Loan"
        "404":
          description: Not found
    patch:
      operationId: updateLoan
      tags: [loans]
      summary: Update a loan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoanUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Loan"
        "404":
          description: Not found
    delete:
      operationId: deleteLoan
      tags: [loans]
      summary: Delete a loan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /loans/{id}/amortization:
    get:
      operationId: getLoanAmortization
      tags: [loans]
      summary: Get the full amortization schedule for a loan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Amortization schedule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoanAmortization"
        "404":
          description: Not found

  # ── Forecasted Transactions ──────────────────────────────────────────────
  /forecast:
    get:
      operationId: listForecast
      tags: [forecasts]
      summary: List forecasted transactions (optionally filtered by date range)
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of forecasted transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ForecastedTransaction"
    post:
      operationId: createForecastedTransaction
      tags: [forecasts]
      summary: Create a manual forecasted transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForecastedTransactionInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForecastedTransaction"

  /forecast/monthly:
    get:
      operationId: getMonthlyForecast
      tags: [forecasts]
      summary: Get monthly cash flow forecast grouped by month (next 12 months)
      responses:
        "200":
          description: Monthly forecast
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonthlyForecast"

  /forecast/regenerate:
    post:
      operationId: regenerateForecast
      tags: [forecasts]
      summary: Regenerate forecasted transactions from bills and pay schedules
      responses:
        "200":
          description: Regenerated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegenerateForecastResult"

  /forecast/reorder:
    post:
      operationId: reorderForecast
      tags: [forecasts]
      summary: Persist a new manual ordering for a set of same-date transactions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReorderForecastInput"
      responses:
        "200":
          description: Reordered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReorderForecastResult"

  /forecast/{id}:
    patch:
      operationId: updateForecastedTransaction
      tags: [forecasts]
      summary: Update a forecasted transaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForecastedTransactionUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForecastedTransaction"
        "404":
          description: Not found
    delete:
      operationId: deleteForecastedTransaction
      tags: [forecasts]
      summary: Delete a forecasted transaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── User Settings ────────────────────────────────────────────────────────────
  /user-settings:
    get:
      operationId: getUserSettings
      tags: [userSettings]
      summary: Get user settings (starting balance)
      responses:
        "200":
          description: User settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSettings"
    post:
      operationId: saveUserSettings
      tags: [userSettings]
      summary: Upsert user settings (starting balance)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserSettingsInput"
      responses:
        "200":
          description: Saved settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSettings"

  # ── Anthropic AI ────────────────────────────────────────────────────────────
  /anthropic/conversations:
    get:
      operationId: listAnthropicConversations
      tags: [anthropic]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnthropicConversation"
    post:
      operationId: createAnthropicConversation
      tags: [anthropic]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnthropicConversationInput"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicConversation"
  /anthropic/conversations/{id}:
    get:
      operationId: getAnthropicConversation
      tags: [anthropic]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicError"
    delete:
      operationId: deleteAnthropicConversation
      tags: [anthropic]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicError"
  /anthropic/conversations/{id}/messages:
    get:
      operationId: listAnthropicMessages
      tags: [anthropic]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnthropicMessage"
    post:
      operationId: sendAnthropicMessage
      tags: [anthropic]
      summary: Send a message and receive an AI response (SSE stream)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnthropicMessageInput"
      responses:
        "200":
          description: SSE stream of assistant response chunks
          content:
            text/event-stream: {}

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # ── Dashboard ────────────────────────────────────────────────────────────
    DashboardSummary:
      type: object
      required: [netWorth, totalAssets, totalLiabilities, monthlyIncome, monthlyExpenses, monthlyCashFlow, upcomingBillsCount, upcomingBillsTotal, billsDueThisWeek]
      properties:
        netWorth:
          type: number
        totalAssets:
          type: number
        totalLiabilities:
          type: number
        monthlyIncome:
          type: number
        monthlyExpenses:
          type: number
        monthlyCashFlow:
          type: number
        upcomingBillsCount:
          type: integer
        upcomingBillsTotal:
          type: number
        billsDueThisWeek:
          type: integer

    # ── Bills ────────────────────────────────────────────────────────────────
    Bill:
      type: object
      required: [id, billName, category, amount, frequency, dueDay, isVariable, isActive, createdAt, updatedAt]
      properties:
        id:
          type: integer
        billName:
          type: string
        category:
          type: string
        amount:
          type: number
        frequency:
          type: string
        dueDay:
          type: integer
        paymentMethod:
          type: ["string", "null"]
        startDate:
          type: ["string", "null"]
        endDate:
          type: ["string", "null"]
        companyUrl:
          type: ["string", "null"]
        isVariable:
          type: boolean
        isActive:
          type: boolean
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    BillInput:
      type: object
      required: [billName, category, amount, frequency, dueDay]
      properties:
        billName:
          type: string
        category:
          type: string
        amount:
          type: number
        frequency:
          type: string
        dueDay:
          type: integer
        paymentMethod:
          type: string
        startDate:
          type: string
        endDate:
          type: string
        companyUrl:
          type: string
        isVariable:
          type: boolean
        isActive:
          type: boolean
        notes:
          type: string

    BillUpdate:
      type: object
      properties:
        billName:
          type: string
        category:
          type: string
        amount:
          type: number
        frequency:
          type: string
        dueDay:
          type: integer
        paymentMethod:
          type: string
        startDate:
          type: string
        endDate:
          type: string
        companyUrl:
          type: string
        isVariable:
          type: boolean
        isActive:
          type: boolean
        notes:
          type: string

    # ── Life Events ────────────────────────────────────────────────────────────
    LifeEvent:
      type: object
      required: [id, eventName, category, amount, timingType, priority, isActive, createdAt, updatedAt]
      properties:
        id:
          type: integer
        eventName:
          type: string
        category:
          type: string
        customCategory:
          type: ["string", "null"]
        amount:
          type: number
        timingType:
          type: string
        eventDate:
          type: ["string", "null"]
        startDate:
          type: ["string", "null"]
        endDate:
          type: ["string", "null"]
        frequency:
          type: ["string", "null"]
        priority:
          type: string
        notes:
          type: ["string", "null"]
        isActive:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string

    LifeEventInput:
      type: object
      required: [eventName, category, amount, timingType, priority]
      properties:
        eventName:
          type: string
        category:
          type: string
        customCategory:
          type: string
        amount:
          type: number
        timingType:
          type: string
        eventDate:
          type: string
        startDate:
          type: string
        endDate:
          type: string
        frequency:
          type: string
        priority:
          type: string
