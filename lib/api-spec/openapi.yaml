openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Otis Financial Life Map API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: bills
    description: Bill management
  - name: paySchedules
    description: Pay schedule management
  - name: accounts
    description: Account management
  - name: assets
    description: Assets and liabilities management
  - name: forecasts
    description: Cash flow forecasting
  - name: dashboard
    description: Dashboard summaries
  - name: otis
    description: Otis AI advisor and scenario engine
  - name: scenarios
    description: Saved what-if scenarios
  - name: userSettings
    description: User preferences and settings
  - name: retirement
    description: Retirement planning and projections

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Dashboard ──────────────────────────────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary (net worth, cash flow, upcoming bills)
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  # ── Bills ───────────────────────────────────────────────────────────────────
  /bills:
    get:
      operationId: listBills
      tags: [bills]
      summary: List all bills
      responses:
        "200":
          description: List of bills
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bill"
    post:
      operationId: createBill
      tags: [bills]
      summary: Create a bill
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BillInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bill"

  /bills/upcoming:
    get:
      operationId: getUpcomingBills
      tags: [bills]
      summary: Get bills due in the next 30 days
      responses:
        "200":
          description: Upcoming bills
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UpcomingBill"

  /bills/{id}:
    get:
      operationId: getBill
      tags: [bills]
      summary: Get a bill by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bill
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bill"
        "404":
          description: Not found
    patch:
      operationId: updateBill
      tags: [bills]
      summary: Update a bill
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BillUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bill"
        "404":
          description: Not found
    delete:
      operationId: deleteBill
      tags: [bills]
      summary: Delete a bill
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  # ── Life Events ───────────────────────────────────────────────────────────
  /life-events:
    get:
      operationId: listLifeEvents
      tags: [lifeEvents]
      summary: List all life events
      responses:
        "200":
          description: List of life events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LifeEvent"
    post:
      operationId: createLifeEvent
      tags: [lifeEvents]
      summary: Create a life event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LifeEventInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LifeEvent"

  /life-events/{id}:
    patch:
      operationId: updateLifeEvent
      tags: [lifeEvents]
      summary: Update a life event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LifeEventUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LifeEvent"
        "404":
          description: Not found
    delete:
      operationId: deleteLifeEvent
      tags: [lifeEvents]
      summary: Delete a life event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  # ── Pay Schedules ─────────────────────────────────────────────────────────
  /pay-schedules:
    get:
      operationId: listPaySchedules
      tags: [paySchedules]
      summary: List all pay schedules
      responses:
        "200":
          description: List of pay schedules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PaySchedule"
    post:
      operationId: createPaySchedule
      tags: [paySchedules]
      summary: Create a pay schedule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PayScheduleInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaySchedule"

  /pay-schedules/{id}:
    get:
      operationId: getPaySchedule
      tags: [paySchedules]
      summary: Get a pay schedule by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Pay schedule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaySchedule"
        "404":
          description: Not found
    patch:
      operationId: updatePaySchedule
      tags: [paySchedules]
      summary: Update a pay schedule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PayScheduleUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaySchedule"
        "404":
          description: Not found
    delete:
      operationId: deletePaySchedule
      tags: [paySchedules]
      summary: Delete a pay schedule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Accounts ──────────────────────────────────────────────────────────────
  /accounts:
    get:
      operationId: listAccounts
      tags: [accounts]
      summary: List all accounts
      responses:
        "200":
          description: List of accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Account"
    post:
      operationId: createAccount
      tags: [accounts]
      summary: Create an account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"

  /accounts/summary:
    get:
      operationId: getAccountsSummary
      tags: [accounts]
      summary: Get net worth and breakdown by account type
      responses:
        "200":
          description: Accounts summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountsSummary"

  /account-goals:
    get:
      operationId: listAccountGoals
      tags: [accounts]
      summary: List savings goals for the user's accounts
      responses:
        "200":
          description: Account goals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AccountGoal"

  /account-goals/{accountId}:
    put:
      operationId: setAccountGoal
      tags: [accounts]
      summary: Set or clear the savings goal for an account
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountGoalInput"
      responses:
        "200":
          description: Updated goal (goalAmount null when cleared)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountGoal"

  /savings/summary:
    get:
      operationId: getSavingsSummary
      tags: [accounts]
      summary: Savings & investments totals with month-over-month change
      responses:
        "200":
          description: Savings summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavingsSummary"

  /accounts/{id}:
    get:
      operationId: getAccount
      tags: [accounts]
      summary: Get an account by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "404":
          description: Not found
    patch:
      operationId: updateAccount
      tags: [accounts]
      summary: Update an account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "404":
          description: Not found
    delete:
      operationId: deleteAccount
      tags: [accounts]
      summary: Delete an account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Assets & Liabilities ──────────────────────────────────────────────────
  /assets:
    get:
      operationId: listAssets
      tags: [assets]
      summary: List all assets and liabilities
      responses:
        "200":
          description: List of assets and liabilities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Asset"
    post:
      operationId: createAsset
      tags: [assets]
      summary: Create an asset or liability
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssetInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Asset"

  /assets/summary:
    get:
      operationId: getAssetsSummary
      tags: [assets]
      summary: Get net worth and breakdown by asset type
      responses:
        "200":
          description: Assets summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetsSummary"

  /assets/{id}:
    get:
      operationId: getAsset
      tags: [assets]
      summary: Get an asset or liability by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Asset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Asset"
        "404":
          description: Not found
    patch:
      operationId: updateAsset
      tags: [assets]
      summary: Update an asset or liability
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssetUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Asset"
        "404":
          description: Not found
    delete:
      operationId: deleteAsset
      tags: [assets]
      summary: Delete an asset or liability
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Loans ─────────────────────────────────────────────────────────────────
  /loans:
    get:
      operationId: listLoans
      tags: [loans]
      summary: List all loans
      responses:
        "200":
          description: List of loans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Loan"
    post:
      operationId: createLoan
      tags: [loans]
      summary: Create a loan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoanInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoanMutationResult"

  /loans/summary:
    get:
      operationId: getLoansSummary
      tags: [loans]
      summary: Get total debt, monthly payments, and payoff date range
      responses:
        "200":
          description: Loans summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoansSummary"

  /loans/{id}:
    get:
      operationId: getLoan
      tags: [loans]
      summary: Get a loan by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Loan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Loan"
        "404":
          description: Not found
    patch:
      operationId: updateLoan
      tags: [loans]
      summary: Update a loan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoanUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoanMutationResult"
        "404":
          description: Not found
    delete:
      operationId: deleteLoan
      tags: [loans]
      summary: Delete a loan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /loans/{id}/amortization:
    get:
      operationId: getLoanAmortization
      tags: [loans]
      summary: Get the full amortization schedule for a loan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Amortization schedule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoanAmortization"
        "404":
          description: Not found

  # ── Forecasted Transactions ──────────────────────────────────────────────
  /forecast:
    get:
      operationId: listForecast
      tags: [forecasts]
      summary: List forecasted transactions (optionally filtered by date range)
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of forecasted transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ForecastedTransaction"
    post:
      operationId: createForecastedTransaction
      tags: [forecasts]
      summary: Create a manual forecasted transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForecastedTransactionInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForecastedTransaction"

  /forecast/monthly:
    get:
      operationId: getMonthlyForecast
      tags: [forecasts]
      summary: Get monthly cash flow forecast grouped by month (next 12 months)
      responses:
        "200":
          description: Monthly forecast
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonthlyForecast"

  /forecast/regenerate:
    post:
      operationId: regenerateForecast
      tags: [forecasts]
      summary: Regenerate forecasted transactions from bills and pay schedules
      responses:
        "200":
          description: Regenerated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegenerateForecastResult"

  /forecast/sync-balance:
    post:
      operationId: syncBalance
      tags: [forecasts]
      summary: Reconcile the forecasted running balance against the actual bank balance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncBalanceInput"
      responses:
        "201":
          description: Balance synced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BalanceSync"
        "400":
          description: Invalid input

  /forecast/balance-syncs:
    get:
      operationId: listBalanceSyncs
      tags: [forecasts]
      summary: List balance sync history (most recent first)
      responses:
        "200":
          description: Balance sync history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BalanceSync"

  /forecast/reorder:
    post:
      operationId: reorderForecast
      tags: [forecasts]
      summary: Persist a new manual ordering for a set of same-date transactions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReorderForecastInput"
      responses:
        "200":
          description: Reordered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReorderForecastResult"

  /forecast/{id}:
    patch:
      operationId: updateForecastedTransaction
      tags: [forecasts]
      summary: Update a forecasted transaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForecastedTransactionUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForecastedTransaction"
        "404":
          description: Not found
    delete:
      operationId: deleteForecastedTransaction
      tags: [forecasts]
      summary: Delete a forecasted transaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── User Settings ────────────────────────────────────────────────────────────
  /user-settings:
    get:
      operationId: getUserSettings
      tags: [userSettings]
      summary: Get user settings (starting balance)
      responses:
        "200":
          description: User settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSettings"
    post:
      operationId: saveUserSettings
      tags: [userSettings]
      summary: Upsert user settings (starting balance)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserSettingsInput"
      responses:
        "200":
          description: Saved settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSettings"

  # ── Retirement ───────────────────────────────────────────────────────────────
  /retirement/settings:
    get:
      operationId: getRetirementSettings
      tags: [retirement]
      summary: Get retirement assumptions
      responses:
        "200":
          description: Retirement settings (defaults if never saved)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetirementSettings"
    post:
      operationId: saveRetirementSettings
      tags: [retirement]
      summary: Upsert retirement assumptions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RetirementSettingsInput"
      responses:
        "200":
          description: Saved retirement settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetirementSettings"

  /retirement/summary:
    get:
      operationId: getRetirementSummary
      tags: [retirement]
      summary: Current savings, projected value, and readiness score
      responses:
        "200":
          description: Retirement summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetirementSummary"

  /retirement/projection:
    get:
      operationId: getRetirementProjection
      tags: [retirement]
      summary: Year-by-year projected savings growth until retirement
      responses:
        "200":
          description: Retirement projection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetirementProjection"

  # ── Otis AI ─────────────────────────────────────────────────────────────────
  /otis/chat:
    post:
      operationId: sendOtisChat
      tags: [otis]
      summary: Send a chat message to Otis and receive an AI response (SSE stream)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OtisChatRequest"
      responses:
        "200":
          description: SSE stream of assistant response chunks
          content:
            text/event-stream: {}
  /otis/history:
    get:
      operationId: getOtisHistory
      tags: [otis]
      summary: Load the user's recent Otis conversation history
      responses:
        "200":
          description: Recent conversation messages, oldest first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OtisHistoryMessage"
  /otis/scenario:
    post:
      operationId: runOtisScenario
      tags: [otis]
      summary: Run a what-if scenario calculation and return impact numbers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunScenarioRequest"
      responses:
        "200":
          description: Scenario impact results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScenarioResult"

  # ── Saved Scenarios ─────────────────────────────────────────────────────────
  /scenarios:
    get:
      operationId: listScenarios
      tags: [scenarios]
      summary: List saved scenarios
      responses:
        "200":
          description: List of saved scenarios
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SavedScenario"
    post:
      operationId: createScenario
      tags: [scenarios]
      summary: Save a scenario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SavedScenarioInput"
      responses:
        "201":
          description: Saved scenario
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedScenario"
  /scenarios/{id}:
    delete:
      operationId: deleteScenario
      tags: [scenarios]
      summary: Delete a saved scenario
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # ── Dashboard ────────────────────────────────────────────────────────────
    DashboardSummary:
      type: object
      required: [netWorth, totalAssets, totalLiabilities, monthlyIncome, monthlyExpenses, monthlyCashFlow, upcomingBillsCount, upcomingBillsTotal, billsDueThisWeek]
      properties:
        netWorth:
          type: number
        totalAssets:
          type: number
        totalLiabilities:
          type: number
        monthlyIncome:
          type: number
        monthlyExpenses:
          type: number
